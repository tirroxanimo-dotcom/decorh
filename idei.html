<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecorH - Idei Noi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #c9a84c; }
html, body { height: 100%; font-family: "Jost", sans-serif; overflow-x: hidden; }
#bg { position: fixed; inset: 0; z-index: 0; background-size: cover; background-position: center; background-image: url('images/img9.jpeg'); }
#bg::after { content: ""; position: absolute; inset: 0; background: rgba(10,6,2,0.55); }
#app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; padding: 40px 20px; }
.back-btn { display: inline-block; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; margin-bottom: 30px; border: 1px solid var(--gold); padding: 8px 20px; border-radius: 30px; width: fit-content; text-decoration: none; }
.back-btn:hover { background: var(--gold); color: #1a1208; }
h1 { font-family: "Cormorant Garamond", serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; color: #fff; letter-spacing: 0.06em; margin-bottom: 10px; }
h1 em { font-style: italic; color: #f5d98a; }
.gold-divider { width: 60px; height: 1px; background: var(--gold); margin: 16px 0; opacity: 0.8; }
.no-idei { font-family: "Cormorant Garamond", serif; font-size: 1.15rem; color: rgba(255,255,255,0.6); font-style: italic; margin-top: 20px; }
.idei-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 20px; max-width: 900px; }
.idee-card { position: relative; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.3s; }
.idee-card:hover { transform: translateY(-4px); }
.idee-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
.idee-card .card-text { padding: 12px; background: rgba(10,6,2,0.75); font-family: "Cormorant Garamond", serif; font-size: 0.88rem; color: #fdf6ec; line-height: 1.5; }
.idee-card .card-delete { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 28px; height: 28px; color: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.idee-card .card-delete:hover { background: rgba(200,0,0,0.7); }
#fullscreen-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
#fullscreen-overlay.visible { display: flex; }
#fullscreen-img { max-width: 100%; max-height: 80vh; border-radius: 12px; object-fit: contain; }
#fullscreen-text { font-family: "Cormorant Garamond", serif; font-size: 1rem; color: #fdf6ec; margin-top: 16px; text-align: center; max-width: 600px; line-height: 1.7; }
#fullscreen-close { position: absolute; top: 20px; right: 24px; background: none; border: 1px solid rgba(255,255,255,0.4); color: #fff; font-size: 1.2rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
#fullscreen-close:hover { background: rgba(255,255,255,0.1); }
.loading-msg { font-family: "Cormorant Garamond", serif; font-size: 1.15rem; color: rgba(255,255,255,0.6); font-style: italic; margin-top: 20px; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="app">
  <a class="back-btn" href="index.html">Inapoi</a>
  <h1><em>DecorH</em> — Idei Salvate</h1>
  <div class="gold-divider"></div>
  <div id="idei-container"><p class="loading-msg">Se incarca ideile...</p></div>
</div>
<div id="fullscreen-overlay">
  <button id="fullscreen-close" onclick="closeFullscreen()">✕</button>
  <img id="fullscreen-img" src="" alt="Aranjament">
  <div id="fullscreen-text"></div>
</div>
<script>
var BIN_ID = '69d7b4b0856a682189160322';
var BIN_KEY = '$2a$10$bYLghQCqVt5qiTAJOGpMsO7FISOLe7dPr5B.pHU4Ace9/L.abt76y';
async function loadIdei() {
  var container = document.getElementById('idei-container');
  try {
    var res = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    var data = await res.json();
    var idei = data.record || [];
    if (!Array.isArray(idei)) idei = [];
    if (idei.length === 0) {
      container.innerHTML = '<p class="no-idei">Nu ai salvat nicio idee inca. Mergi la generator si salveaza idei!</p>';
      return;
    }
    var grid = document.createElement('div');
    grid.className = 'idei-grid';
    idei.forEach(function(idee, index) {
      var card = document.createElement('div');
      card.className = 'idee-card';
      card.innerHTML =
        '<img src="' + idee.img + '" alt="Aranjament">' +
        '<div class="card-text">' + idee.text.substring(0, 100) + '...</div>' +
        '<button class="card-delete" onclick="deleteIdee(' + index + ', event)">✕</button>';
      card.onclick = function() { openFullscreen(idee); };
      grid.appendChild(card);
    });
    container.innerHTML = '';
    container.appendChild(grid);
  } catch (e) {
    container.innerHTML = '<p class="no-idei">Eroare la incarcarea ideilor. Incearca din nou!</p>';
  }
}
async function deleteIdee(index, e) {
  e.stopPropagation();
  try {
    var res = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    var data = await res.json();
    var idei = data.record || [];
    idei.splice(index, 1);
    await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
      body: JSON.stringify(idei)
    });
    loadIdei();
  } catch (e) {
    alert('Eroare la stergere!');
  }
}
function openFullscreen(idee) {
  document.getElementById('fullscreen-img').src = idee.img;
  document.getElementById('fullscreen-text').textContent = idee.text;
  document.getElementById('fullscreen-overlay').classList.add('visible');
}
function closeFullscreen() {
  document.getElementById('fullscreen-overlay').classList.remove('visible');
}
loadIdei();
</script>
</body>
</html>
