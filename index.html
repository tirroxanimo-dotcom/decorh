<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecorH - Aranjamente cu Suflet</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #c9a84c; --glass-border: rgba(255,255,255,0.25); }
html, body { height: 100%; font-family: "Jost", sans-serif; overflow-x: hidden; }
#bg-wrap { position: fixed; inset: 0; z-index: 0; }
.bg-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.6s ease-in-out; }
.bg-slide.active { opacity: 1; }
.bg-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(10,6,2,0.45) 0%, rgba(10,6,2,0.20) 50%, rgba(10,6,2,0.50) 100%); }
#app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
header { text-align: center; padding: 48px 20px 20px; }
.logo-line { font-family: "Cormorant Garamond", serif; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 300; color: #fff; letter-spacing: 0.06em; text-shadow: 0 2px 24px rgba(0,0,0,0.5); line-height: 1.1; }
.logo-line em { font-style: italic; color: #f5d98a; }
.tagline { margin-top: 8px; font-size: 0.85rem; font-weight: 300; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
.gold-divider { width: 60px; height: 1px; background: var(--gold); margin: 16px auto; opacity: 0.8; }
nav.main-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 20px 24px 28px; }
.nav-btn { position: relative; width: 160px; height: 160px; border-radius: 16px; overflow: hidden; cursor: pointer; border: 1.5px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0,0,0,0.35); transition: transform 0.3s ease, box-shadow 0.3s ease; flex-shrink: 0; }
.nav-btn:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 16px 48px rgba(0,0,0,0.45); }
.nav-btn .btn-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.4s ease; }
.nav-btn:hover .btn-bg { transform: scale(1.08); }
.nav-btn .btn-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.10) 55%); }
.nav-btn .btn-label { position: absolute; bottom: 12px; left: 0; right: 0; text-align: center; color: #fff; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; text-shadow: 0 1px 8px rgba(0,0,0,0.6); padding: 0 8px; }
#generator { margin: 0 auto 40px; width: min(640px, 92vw); position: relative; overflow: hidden; border: 1px solid var(--glass-border); border-radius: 20px; padding: 28px 28px 24px; box-shadow: 0 12px 48px rgba(0,0,0,0.5); }
#gen-bg-photo { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
#gen-bg-photo::after { content: ""; position: absolute; inset: 0; background: rgba(10,6,2,0.25); }
#generator > *:not(#gen-bg-photo) { position: relative; z-index: 1; }
#generator h2 { font-family: "Cormorant Garamond", serif; font-size: 1.5rem; font-weight: 300; color: #f5d98a; margin-bottom: 6px; }
#generator p.gen-sub { font-size: 0.78rem; color: rgba(255,255,255,0.85); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 18px; }
.gen-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.gen-select, .gen-input { flex: 1; min-width: 120px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; color: #fff; padding: 10px 14px; font-family: "Jost", sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.2s; }
.gen-select option { background: #1a1208; color: #fff; }
.gen-select:focus, .gen-input:focus { border-color: var(--gold); }
.gen-input::placeholder { color: rgba(255,255,255,0.55); }
.btn-generate { width: 100%; padding: 13px; background: linear-gradient(135deg, #c9a84c, #e8c96a, #c9a84c); background-size: 200%; border: none; border-radius: 12px; font-family: "Jost", sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #1a1208; cursor: pointer; transition: background-position 0.4s, transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(201,168,76,0.35); }
.btn-generate:hover { background-position: right; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,168,76,0.5); }
.btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
#result-box { margin-top: 18px; padding: 18px; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.20); border-radius: 14px; display: none; }
#result-box.visible { display: block; }
#result-text { font-family: "Cormorant Garamond", serif; font-size: 1.05rem; font-weight: 300; color: #fdf6ec; line-height: 1.8; white-space: pre-wrap; margin-bottom: 16px; }
.result-label { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.img-label { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; display: none; }
#result-image { width: 100%; border-radius: 12px; display: none; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; margin-bottom: 12px; }
.loading-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin: 0 2px; animation: dot-bounce 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }
footer { margin-top: auto; text-align: center; padding: 16px; font-size: 0.72rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.35); text-transform: uppercase; }
.slide-dots { position: fixed; right: 16px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 10; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.35); transition: background 0.3s, transform 0.3s; cursor: pointer; }
.dot.active { background: var(--gold); transform: scale(1.5); }
@media (max-width: 480px) { .nav-btn { font-size: 0.75rem; padding: 9px 16px; } }
</style>
</head>
<body>
<div id="bg-wrap"><div class="bg-overlay"></div></div>
<div class="slide-dots" id="slide-dots"></div>
<div id="app">
  <header>
    <div class="logo-line"><em>DecorH</em></div>
    <div class="tagline">Transformam momentele tale in amintiri de neuitat</div>
    <div class="gold-divider"></div>
  </header>
  <nav class="main-nav" id="main-nav"></nav>
  <section id="generator">
    <div id="gen-bg-photo"></div>
    <h2>Generator de Idei cu AI</h2>
    <p class="gen-sub">Descrie ce vrei si obtii inspiratie instant</p>
    <div class="gen-row">
      <select class="gen-select" id="sel-ocazie">
        <option value="">Ocazia</option>
        <option value="Pasti">Pasti</option>
        <option value="Craciun">Craciun</option>
        <option value="Nunta">Nunta</option>
        <option value="Botez">Botez</option>
        <option value="Zi de nastere">Zi de nastere</option>
        <option value="Martisor">Martisor</option>
        <option value="8 Martie">8 Martie</option>
        <option value="Decoratiune acasa">Decoratiune acasa</option>
      </select>
      <select class="gen-select" id="sel-stil">
        <option value="">Stilul</option>
        <option value="romantic si delicat">Romantic si delicat</option>
        <option value="elegant si auriu">Elegant si auriu</option>
        <option value="rustic si natural">Rustic si natural</option>
        <option value="modern si minimalist">Modern si minimalist</option>
        <option value="vibrant si colorat">Vibrant si colorat</option>
        <option value="vintage si retro">Vintage si retro</option>
      </select>
    </div>
    <div class="gen-row">
      <input class="gen-input" id="inp-detalii" placeholder="Ex: cu trandafiri roz, pentru masa de 10 persoane...">
    </div>
    <button class="btn-generate" id="btn-gen" onclick="generateIdea()">Genereaza idee de aranjament</button>
    <div id="result-box">
      <div class="result-label">Idee generata</div>
      <div id="result-text"></div>
      <div class="img-label" id="img-label">Previzualizare aranjament</div>
      <img id="result-image" alt="Aranjament generat" onclick="openFullscreenImg()">
      <div id="save-row" style="display:none;margin-top:12px;align-items:center;gap:10px;">
        <input type="checkbox" id="chk-save" style="width:18px;height:18px;accent-color:#c9a84c;cursor:pointer;">
        <label for="chk-save" style="color:rgba(255,255,255,0.85);font-size:0.85rem;cursor:pointer;">Salveaza in Idei Noi</label>
        <button onclick="saveIdee()" style="margin-left:auto;padding:8px 20px;background:linear-gradient(135deg,#c9a84c,#e8c96a,#c9a84c);border:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:0.8rem;font-weight:500;color:#1a1208;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;">Salveaza</button>
      </div>
    </div>
  </section>
  <footer>2025 DecorH - Creat cu dragoste</footer>
</div>
<script>
var UNSPLASH_KEY = 'kSVsTcXsDnfrUV_gMBsoGhMs_WxXI7WNy2pnuea4pyg';
var BIN_ID = '69d7b4b0856a682189160322';
var BIN_KEY = '$2a$10$bYLghQCqVt5qiTAJOGpMsO7FISOLe7dPr5B.pHU4Ace9/L.abt76y';
var lastImageUrl = '';
var lastText = '';
var BG_IMAGES = [
  "images/img5.jpeg","images/img2.jpeg","images/img3.jpeg","images/img4.jpeg",
  "images/img6.jpeg","images/img7.jpeg","images/img8.jpeg","images/img9.jpeg",
  "images/img10.jpeg","images/img11.jpeg","images/img12.jpeg","images/img13.jpeg",
  "images/img14.jpeg","images/img15.jpeg","images/img16.jpeg"
];
var NAV_ITEMS = [
  { label: "Nunti", img: "images/img2.jpeg", page: "nunti.html" },
  { label: "Botezuri", img: "images/img3.jpeg", page: "botezuri.html" },
  { label: "Pasti", img: "images/img4.jpeg", page: "pasti.html" },
  { label: "Craciun", img: "images/img5.jpeg", page: "craciun.html" },
  { label: "8 Martie", img: "images/img6.jpeg", page: "martie.html" },
  { label: "Acasa", img: "images/img7.jpeg", page: "acasa.html" },
  { label: "Idei Noi", img: "images/img9.jpeg", page: "idei.html" }
];
var navEl = document.getElementById('main-nav');
NAV_ITEMS.forEach(function(item) {
  var btn = document.createElement('div');
  btn.className = 'nav-btn';
  btn.innerHTML = '<div class="btn-bg" style="background-image:url(\'' + item.img + '\')"></div><div class="btn-overlay"></div><div class="btn-label">' + item.label + '</div>';
  btn.onclick = function() { window.location.href = item.page; };
  navEl.appendChild(btn);
});
var bgWrap = document.getElementById('bg-wrap');
var dotsContainer = document.getElementById('slide-dots');
var currentSlide = 0;
BG_IMAGES.forEach(function(src, i) {
  var slide = document.createElement('div');
  slide.className = 'bg-slide' + (i === 0 ? ' active' : '');
  slide.style.backgroundImage = 'url(\'' + src + '\')';
  bgWrap.appendChild(slide);
  var dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = (function(n) { return function() { goToSlide(n); }; })(i);
  dotsContainer.appendChild(dot);
});
function goToSlide(n) {
  var slides = document.querySelectorAll('.bg-slide');
  var dots = document.querySelectorAll('.dot');
  slides[currentSlide].classList.remove('active');
  dots[currentSlide].classList.remove('active');
  currentSlide = n;
  slides[currentSlide].classList.add('active');
  dots[currentSlide].classList.add('active');
}
setInterval(function() { goToSlide((currentSlide + 1) % BG_IMAGES.length); }, 5000);
document.getElementById('gen-bg-photo').style.backgroundImage = 'url(\'images/img10.jpeg\')';
async function generateIdea() {
  var ocazie = document.getElementById('sel-ocazie').value;
  var stil = document.getElementById('sel-stil').value;
  var detalii = document.getElementById('inp-detalii').value;
  if (!ocazie && !stil && !detalii) { alert('Te rog completeaza cel putin un camp!'); return; }
  var btn = document.getElementById('btn-gen');
  var resultBox = document.getElementById('result-box');
  var resultText = document.getElementById('result-text');
  var resultImage = document.getElementById('result-image');
  var imgLabel = document.getElementById('img-label');
  var saveRow = document.getElementById('save-row');
  var chk = document.getElementById('chk-save');
  btn.disabled = true;
  resultBox.classList.add('visible');
  resultImage.style.display = 'none';
  imgLabel.style.display = 'none';
  saveRow.style.display = 'none';
  chk.checked = false;
  resultText.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  try {
    var response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ocazie: ocazie, stil: stil, detalii: detalii })
    });
    var data = await response.json();
    lastText = data.result;
    resultText.textContent = lastText;
  } catch (err) {
    lastText = '';
    resultText.textContent = 'A aparut o eroare. Te rog incearca din nou.';
  }
  try {
    var query = 'floral arrangement ' + (ocazie || '') + ' ' + (stil || '') + ' ' + (detalii || '');
    var imgResponse = await fetch(
      'https://api.unsplash.com/photos/random?query=' + encodeURIComponent(query) + '&orientation=landscape&client_id=' + UNSPLASH_KEY
    );
    var imgData = await imgResponse.json();
    if (imgData && imgData.urls && imgData.urls.regular) {
      lastImageUrl = imgData.urls.regular;
      resultImage.src = lastImageUrl;
      resultImage.onload = function() {
        resultImage.style.display = 'block';
        imgLabel.style.display = 'block';
        saveRow.style.display = 'flex';
      };
    }
  } catch (e) {
    resultImage.style.display = 'none';
  }
  btn.disabled = false;
}
function openFullscreenImg() {
  if (!lastImageUrl) return;
  var overlay = document.getElementById('fs-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'fs-overlay';
    overlay.style.cssText = 'display:flex;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.95);flex-direction:column;align-items:center;justify-content:center;padding:20px;';
    overlay.innerHTML =
      '<button onclick="document.getElementById(\'fs-overlay\').style.display=\'none\'" style="position:absolute;top:20px;right:24px;background:none;border:1px solid rgba(255,255,255,0.4);color:#fff;font-size:1.2rem;width:40px;height:40px;border-radius:50%;cursor:pointer;">✕</button>' +
      '<img id="fs-img" style="max-width:100%;max-height:80vh;border-radius:12px;object-fit:contain;">' +
      '<div id="fs-text" style="font-family:Cormorant Garamond,serif;font-size:1rem;color:#fdf6ec;margin-top:16px;text-align:center;max-width:600px;line-height:1.7;"></div>';
    document.body.appendChild(overlay);
  }
  document.getElementById('fs-img').src = lastImageUrl;
  document.getElementById('fs-text').textContent = lastText;
  overlay.style.display = 'flex';
}
async function saveIdee() {
  var chk = document.getElementById('chk-save');
  if (!chk.checked) { alert('Bifeaza casuta pentru a salva!'); return; }
  if (!lastImageUrl) { alert('Nu exista imagine de salvat!'); return; }
  try {
    var getRes = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    var getData = await getRes.json();
    var idei = getData.record || [];
    if (!Array.isArray(idei)) idei = [];
    idei.push({ img: lastImageUrl, text: lastText });
    await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
      body: JSON.stringify(idei)
    });
    chk.checked = false;
    alert('Idee salvata! Se vede pe orice dispozitiv in Idei Noi!');
  } catch (e) {
    alert('Eroare la salvare. Incearca din nou!');
  }
}
</script>
</body>
</html>
