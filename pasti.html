<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecorH - Pasti</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #c9a84c; }
html, body { height: 100%; font-family: "Jost", sans-serif; overflow-x: hidden; }
#bg { position: fixed; inset: 0; z-index: 0; background-size: cover; background-position: center; }
#bg::after { content: ""; position: absolute; inset: 0; background: rgba(10,6,2,0.55); }
#app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; padding: 40px 20px; }
.back-btn { display: inline-block; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; margin-bottom: 30px; border: 1px solid var(--gold); padding: 8px 20px; border-radius: 30px; width: fit-content; text-decoration: none; }
.back-btn:hover { background: var(--gold); color: #1a1208; }
h1 { font-family: "Cormorant Garamond", serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; color: #fff; letter-spacing: 0.06em; margin-bottom: 10px; }
h1 em { font-style: italic; color: #f5d98a; }
.gold-divider { width: 60px; height: 1px; background: var(--gold); margin: 16px 0; opacity: 0.8; }
.content { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 30px; max-width: 700px; margin-top: 10px; }
.content p { font-family: "Cormorant Garamond", serif; font-size: 1.15rem; font-weight: 300; color: #fdf6ec; line-height: 1.9; }
.content p + p { margin-top: 16px; }
.cta { display: inline-block; margin-top: 28px; padding: 14px 32px; background: linear-gradient(135deg, #c9a84c, #e8c96a, #c9a84c); border-radius: 12px; font-family: "Jost", sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #1a1208; cursor: pointer; text-decoration: none; box-shadow: 0 4px 20px rgba(201,168,76,0.35); }
.cta:hover { opacity: 0.9; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="app">
  <a class="back-btn" href="decorh.html">Inapoi</a>
  <h1><em>DecorH</em></h1>
  <div class="gold-divider"></div>
  <div class="content" id="content">
    <p id="page-text">Se incarca...</p>
  </div>
</div>
<script>
var pages = {
  nunti: {
    bg: "images/img2.jpeg",
    title: "Aranjamente pentru Nunti",
    text: "Nunta ta merita cele mai frumoase aranjamente florale. La DecorH cream decoratiuni de vis — buchete de mireasa, aranjamente pentru masa, arcuri florale si centerpiece-uri elegante care transforma fiecare detaliu intr-o amintire de neuitat. Fiecare aranjament este creat cu pasiune si atentie, personalizat special pentru ziua ta cea mare. Contacteaza-ne pentru o oferta personalizata si hai sa cream impreuna nunta de basm pe care ai visat-o intotdeauna."
  },
  botezuri: {
    bg: "images/img3.jpeg",
    title: "Aranjamente pentru Botezuri",
    text: "Celebreaza sosirea celui mic cu aranjamente florale delicate si pline de caldura. Cream decoratiuni pastelate, blande si elegante pentru botezul bebelusului tau — de la aranjamente pentru masa pana la decoruri pentru sala si buchete pentru parinti. Fiecare detaliu este ales cu grija pentru a crea o atmosfera de bucurie si iubire. Lasati-ne sa transformam ziua botezului intr-o amintire magica pe care o veti tezauriza mereu."
  },
  pasti: {
    bg: "images/img4.jpeg",
    title: "Aranjamente de Pasti",
    text: "Sarbatoreste Pastele cu aranjamente florale traditionale si moderne, pline de culoare si viata. La DecorH cream cosuri cu flori de primavara, aranjamente cu lalele, narcise si hortensii care aduc bucuria renasterii in casa ta. Decoratiunile noastre de Pasti combina traditia cu eleganta moderna pentru a crea o atmosfera calda si primitoare. Comanda acum si bucura-te de cele mai frumoase decoratiuni pascale!"
  },
  craciun: {
    bg: "images/img5.jpeg",
    title: "Aranjamente de Craciun",
    text: "Transforma-ti casa intr-un taram de poveste de Craciun cu aranjamentele noastre florale magice. Cream coronite, centrepiece-uri cu brad, aranjamente cu conuri de pin, scortigoara si flori de iarna care aduc caldura si magia sarbatorilor in fiecare colt al casei tale. Fiecare aranjament este realizat manual cu materiale naturale de cea mai buna calitate. Comanda din timp si pregateste-te pentru cele mai frumoase sarbatori de iarna!"
  },
  martie: {
    bg: "images/img6.jpeg",
    title: "Aranjamente de 8 Martie",
    text: "Surprinde femeia speciala din viata ta cu aranjamente florale deosebite de 8 Martie. La DecorH cream buchete romantice, aranjamente in cutii, kompozitii cu trandafiri, bujori si flori de sezon care transmit dragostea si aprecierea ta. Fiecare aranjament este o declaratie de iubire si recunostinta, creat special pentru a aduce un zambet pe fata celei dragi. Comanda acum si livram direct la usa ta!"
  },
  acasa: {
    bg: "images/img7.jpeg",
    title: "Decoratiuni pentru Casa",
    text: "Transforma-ti locuinta intr-un spatiu de vis cu aranjamentele noastre florale pentru interior. Cream decoratiuni permanente si sezoniere — de la buchete uscate elegante la aranjamente cu flori proaspete, kompozitii in vaze si decoruri pentru fiecare camera. Florile aduc viata, culoare si energie pozitiva in orice spatiu. Lasa-ne sa cream pentru tine aranjamentul perfect care sa se potriveasca stilului si personalitatii tale."
  },
  idei: {
    bg: "images/img9.jpeg",
    title: "Idei Noi de Aranjamente",
    text: "Descopera cele mai noi tendinte in arta florala si lasa-te inspirata de creatiile noastre unice. La DecorH suntem mereu cu un pas inainte — experimentam cu texturi, culori si forme pentru a-ti oferi aranjamente cu adevarat speciale si originale. De la stilul boho la cel minimalist, de la romantic la avangardist, avem o idee perfecta pentru tine. Urmareste-ne pentru inspiratie zilnica si contacteaza-ne pentru a transforma viziunea ta in realitate!"
  }
};
var pageName = window.location.pathname.split('/').pop().replace('.html','');
var data = pages[pageName] || pages['idei'];
document.getElementById('bg').style.backgroundImage = 'url(\'' + data.bg + '\')';
document.querySelector('h1').innerHTML = '<em>DecorH</em> — ' + data.title;
document.getElementById('page-text').textContent = data.text;
document.querySelector('.content').insertAdjacentHTML('beforeend', '<a class="cta" href="decorh.html">Contacteaza-ne acum</a>');
</script>
</body>
</html>
